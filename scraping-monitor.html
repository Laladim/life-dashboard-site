  header h1 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  header .sub { font-size: 13px; opacity: 0.85; margin-top: 4px; }

  .pct-light { background: #DBEAFE; color: #1E40AF; font-weight: 500; padding: 3px 8px; border-radius: 4px; }

function bounceClass(b) {
  if (b < 40) return 'bounce-green';
  if (b <= 70) return 'bounce-yellow';
  return 'bounce-red';
}
function pctClass(p) {
  if (p >= 30) return 'pct-strong';
  if (p >= 10) return 'pct-medium';
  if (p >= 3)  return 'pct-light';
  return 'pct-tiny';
}
function channelClass(c) {
  const m = {'Direct':'ch-direct','Organic Search':'ch-organic','AI Search':'ch-ai',
    'Referral':'ch-referral','Organic Social':'ch-social','Paid Search':'ch-paid'};
  return m[c] || 'ch-unknown';
}
function fmtNum(n) { return n == null ? '—' : n.toLocaleString(); }

function renderPane(container, data) {
  const totalSessions = data.buckets.reduce((a, b) => a + b.sessions, 0);
  const totalAI = data.buckets.reduce((a, b) => a + b.ai, 0);

    const nonDirect = ch.find(c => c[0] !== 'Direct' && c[1] > 0);

    bucketRow.innerHTML = `
      <td><span class="period-tag">${data.period}</span></td>
      <td><span class="expand-icon">▸</span><span class="bucket-name">${b.bucket}</span></td>
      <td class="num">${fmtNum(b.sessions)}</td>
      <td class="num"><span class="${pctClass(parseFloat(bPct))}">${bPct}%</span></td>
      <td class="num">${fmtNum(b.users)}</td>
      <td class="num"><span class="${bounceClass(b.bounce)}">${b.bounce}%</span></td>
      <td><span class="channel-tag ${channelClass(b.top_channel)}">${b.top_channel}</span></td>
      <td class="num">${fmtNum(b.direct)}</td>
      <td class="num">${fmtNum(b.organic)}</td>
      <td class="num">${fmtNum(b.ai)}</td>
      <td class="num">${fmtNum(b.referral)}</td>
      <td class="num">${fmtNum(b.social)}</td>
      <td class="num">${fmtNum(b.paid)}</td>
      <td class="num">${fmtNum(b.other)}</td>`;
    tbody.appendChild(bucketRow);

    b.urls.forEach(u => {
      const uPct = periodTotalSessions > 0 ? ((u.sessions / periodTotalSessions) * 100).toFixed(1) : '0.0';
      const ur = document.createElement('tr');
      ur.className = 'url-row';
      ur.dataset.parent = idx;
      ur.innerHTML = `
        <td></td>
        <td class="url-cell">${u.url}</td>
        <td class="num">${fmtNum(u.sessions)}</td>
        <td class="num"><span class="${pctClass(parseFloat(uPct))}">${uPct}%</span></td>
        <td class="num">${fmtNum(u.users)}</td>
        <td class="num"><span class="${bounceClass(u.bounce)}">${u.bounce}%</span></td>
        <td><span class="channel-tag ${channelClass(u.top_channel)}">${u.top_channel}</span></td>
        <td class="num">${fmtNum(u.channels.Direct)}</td>
        <td class="num">${fmtNum(u.channels['Organic Search'])}</td>
        <td class="num">${fmtNum(u.channels['AI Search'])}</td>
        <td class="num">${fmtNum(u.channels.Referral)}</td>
        <td class="num">${fmtNum(u.channels['Organic Social'])}</td>
        <td class="num">${fmtNum(u.channels['Paid Search'])}</td>
        <td class="num">${fmtNum(u.other_channels)}</td>`;
      tbody.appendChild(ur);
    });
  });

  container.querySelectorAll('tr.bucket-row').forEach(row => {
    row.addEventListener('click', () => {
      row.classList.toggle('open');
      const idx = row.dataset.idx;
      container.querySelectorAll(`tr.url-row[data-parent="${idx}"]`).forEach(u => u.classList.toggle('open'));
    });
  });
}

function renderTimeSeries(container, periods, mode) {
  const allBuckets = [...new Set(periods.flatMap(p => p.buckets.map(b => b.bucket)))].sort();
  const filterId = `bucket-filter-${mode}`;
  const countId = `${filterId}-count`;
  container.innerHTML = `
    <div class="table-card">
      <h3>${mode === 'weekly' ? 'Last 52 weeks' : 'Last 12 months'} — every bucket shown, color-grouped by month</h3>
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap;">
        <label for="${filterId}" style="color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.04em; font-size:11px;">Filter bucket</label>
        <select id="${filterId}" style="padding:6px 28px 6px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; background:white; color:var(--navy); cursor:pointer; font-family:inherit; min-width:220px;">
          <option value="__all__">All buckets</option>
          ${allBuckets.map(b => `<option value="${b}">${b}</option>`).join('')}
        </select>
        <span id="${countId}" style="color:var(--muted); font-size:12px;"></span>
      </div>
      <table class="data totals">
        <thead><tr>
          <th>Period</th>
          <th>Bucket</th>
          <th class="num">Sessions</th>
          <th class="num">% of Period</th>
          <th class="num">Users</th>
          <th class="num">Bounce</th>
          <th>Top Channel</th>
          <th class="num">Direct</th>
          <th class="num">Organic</th>
          <th class="num">AI</th>
          <th class="num">Referral</th>
          <th class="num">Social</th>
          <th class="num">Paid</th>
          <th class="num">Other</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>`;
  const tbody = container.querySelector('tbody');
  const select = container.querySelector(`#${filterId}`);
  const countEl = container.querySelector(`#${countId}`);

  function applyFilter(bucket) {
    tbody.innerHTML = '';
    let prevMonth = null;
    let colorIdx = -1;
    let rowCount = 0;
    let totalSessions = 0;
    periods.forEach(p => {
      if (p.month_key !== prevMonth) {
        colorIdx = (colorIdx + 1) % 4;
        prevMonth = p.month_key;
      }
      p.buckets.forEach(b => {
        if (bucket !== '__all__' && b.bucket !== bucket) return;
        const pct = p.total_sessions > 0 ? ((b.sessions / p.total_sessions) * 100).toFixed(1) : '0.0';
        const tr = document.createElement('tr');
        tr.className = `month-c${colorIdx}`;
        tr.innerHTML = `
          <td><span class="period-tag">${p.period_label}</span></td>
          <td><span class="bucket-name">${b.bucket}</span></td>
          <td class="num">${fmtNum(b.sessions)}</td>
          <td class="num"><span class="${pctClass(parseFloat(pct))}">${pct}%</span></td>
          <td class="num">${fmtNum(b.users)}</td>
          <td class="num"><span class="${bounceClass(b.bounce)}">${b.bounce}%</span></td>
          <td><span class="channel-tag ${channelClass(b.top_channel)}">${b.top_channel}</span></td>
          <td class="num">${fmtNum(b.direct)}</td>
          <td class="num">${fmtNum(b.organic)}</td>
          <td class="num">${fmtNum(b.ai)}</td>
          <td class="num">${fmtNum(b.referral)}</td>
          <td class="num">${fmtNum(b.social)}</td>
          <td class="num">${fmtNum(b.paid)}</td>
          <td class="num">${fmtNum(b.other)}</td>`;
        tbody.appendChild(tr);
        rowCount++;
        totalSessions += b.sessions;
      });
    });
    countEl.textContent = bucket === '__all__'
      ? `${rowCount} rows across ${periods.length} ${mode === 'weekly' ? 'weeks' : 'months'}`
      : `${rowCount} ${mode === 'weekly' ? 'weeks' : 'months'} · ${fmtNum(totalSessions)} total sessions for ${bucket}`;
  }

  select.addEventListener('change', () => applyFilter(select.value));
  applyFilter('__all__');
}

document.querySelectorAll('.tab-content').forEach(pane => {
  const key = pane.dataset.payload;
  if (key === 'weekly' || key === 'monthly') {
    renderTimeSeries(pane, DATA[key], key);
  } else {
    renderPane(pane, DATA[key]);
  }
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});
</script>
</body>
</html>
