<title>Cobalt · Traffic Insights Dashboard</title>

<style>
  :root {
    /* 2026 Cobalt brand — per cobalt-brand-visual-expert.md v3 */
    --lavender: #9F93E2;
    --indigo:   #6366F1;
    --navy:     #0B0915;
    --slate:    #1a1538;
    --blue:     #6366F1;
    --blue-light: #9F93E2;
    --bg:       #F8F7FD;
    --card:     #ffffff;
    --text:     #1a1a2e;
    --muted:    #5a5a7a;
    --border:   #e0dff0;
    --green:    #059669;
    --green-bg: #D1FAE5;
    --yellow:   #D97706;
    --yellow-bg:#FEF3C7;
    --red:      #E11D48;
    --red-bg:   #FEE2E2;
    --purple:   #7C3AED;
    --purple-bg:#EDE9FE;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
  h1, h2, h3, .kpi .value { font-family: "Sora", "Inter", sans-serif; }
  header { background: linear-gradient(135deg, #0B0915 0%, #1a1538 55%, #6366F1 100%); color: #F2F0FF;
    padding: 28px 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
  header h1 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  header .sub { font-size: 13px; opacity: 0.85; margin-top: 4px; }
  header .nav { display: flex; gap: 18px; flex-wrap: wrap; }
  header a { color: rgba(255,255,255,0.85); font-size: 13px; text-decoration: none; padding: 6px 0;
    border-bottom: 1px solid transparent; transition: border-color 0.2s; }
  header a:hover { color: white; border-bottom-color: rgba(255,255,255,0.6); }
  main { max-width: 1500px; margin: 0 auto; padding: 24px 40px 60px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 18px; border-bottom: 1px solid var(--border); }
  .tab-btn { padding: 10px 20px; background: transparent; border: none; cursor: pointer;
    font-size: 14px; font-weight: 500; color: var(--muted); border-bottom: 2px solid transparent;
    margin-bottom: -1px; font-family: inherit; }
  .tab-btn:hover { color: var(--slate); }
  .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; text-align: center; }
  .kpi .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .kpi .value { font-size: 28px; font-weight: 700; color: var(--navy); }
  .kpi .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .insights { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 900px) { .insights { grid-template-columns: 1fr; } }
  .insights-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .insights-card h3 { margin: 0 0 12px; font-size: 15px; font-weight: 600; }
  .insights-card.wins h3 { color: var(--green); }
  .insights-card.probs h3 { color: var(--red); }
  .insights-card ul { margin: 0; padding-left: 18px; font-size: 13px; color: var(--slate); line-height: 1.6; }
  .insights-card strong { color: var(--navy); }

  .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 24px; }
  .table-card h3 { margin: 0 0 14px; font-size: 15px; font-weight: 600; color: var(--navy); }
  .legend { display: flex; gap: 14px; font-size: 11px; color: var(--muted); margin-bottom: 10px; }
  .legend .sw { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }

  table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.data th { text-align: left; padding: 10px 8px; font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); border-bottom: 2px solid var(--border); }
  table.data th.num { text-align: right; }
  table.data td { padding: 10px 8px; border-bottom: 1px solid var(--border); }
  table.data td.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.data tr.bucket-row { cursor: pointer; font-weight: 600; background: #FAFBFC; }
  table.data tr.bucket-row:hover { background: #F1F5F9; }
  table.data tr.bucket-row td { color: var(--navy); }
  table.data tr.url-row { display: none; background: white; font-weight: 400; }
  table.data tr.url-row.open { display: table-row; }
  table.data tr.url-row td { padding-left: 28px; font-size: 12px; color: var(--slate); border-bottom: 1px solid #F1F5F9; }
  table.data tr.url-row td.url-cell { font-family: "SF Mono", Monaco, monospace; font-size: 11.5px; color: var(--blue); word-break: break-all; }

  .period-tag { display: inline-block; background: var(--purple-bg); color: var(--purple);
    font-size: 10.5px; font-weight: 600; padding: 2px 8px; border-radius: 10px; letter-spacing: 0.02em; }
  .bucket-name { font-family: "SF Mono", Monaco, monospace; font-size: 12.5px; }

  .bounce-green { background: var(--green-bg); color: var(--green); font-weight: 600; padding: 3px 8px; border-radius: 4px; }
  .bounce-yellow { background: var(--yellow-bg); color: var(--yellow); font-weight: 600; padding: 3px 8px; border-radius: 4px; }
  .bounce-red { background: var(--red-bg); color: var(--red); font-weight: 600; padding: 3px 8px; border-radius: 4px; }

  .pct-strong { background: #A7F3D0; color: #065F46; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
  .pct-medium { background: #FEF3C7; color: #92400E; font-weight: 600; padding: 3px 8px; border-radius: 4px; }
  .pct-light { background: #DBEAFE; color: #1E40AF; font-weight: 500; padding: 3px 8px; border-radius: 4px; }
  .pct-tiny { background: #F1F5F9; color: #64748B; padding: 3px 8px; border-radius: 4px; }

  .channel-tag { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .ch-direct { background: #F1F5F9; color: var(--slate); }
  .ch-organic { background: var(--green-bg); color: var(--green); }
  .ch-ai { background: var(--purple-bg); color: var(--purple); }
  .ch-referral { background: #DBEAFE; color: var(--blue); }
  .ch-social { background: #FFE4E1; color: #BE185D; }
  .ch-paid { background: var(--yellow-bg); color: var(--yellow); }
  .ch-unknown { background: #F1F5F9; color: var(--muted); }

  .expand-icon { display: inline-block; width: 12px; color: var(--muted); margin-right: 6px; transition: transform 0.15s; }
  tr.bucket-row.open .expand-icon { transform: rotate(90deg); }

  table.totals tr.month-c0 td { background: #DBEAFE; }
  table.totals tr.month-c1 td { background: #D1FAE5; }
  table.totals tr.month-c2 td { background: #FEF3C7; }
  table.totals tr.month-c3 td { background: #FCE7F3; }
  table.totals td { padding: 12px 10px; }
  table.totals td.label { font-weight: 600; color: var(--navy); }

  .footer { text-align: center; color: var(--muted); font-size: 12px; padding: 16px; }
</style>

function bounceClass(b) {
  if (b < 40) return 'bounce-green';
  if (b <= 70) return 'bounce-yellow';
  return 'bounce-red';
}
function pctClass(p) {
  if (p >= 30) return 'pct-strong';
  if (p >= 10) return 'pct-medium';
  if (p >= 3)  return 'pct-light';
  return 'pct-tiny';
}
function channelClass(c) {
  const m = {'Direct':'ch-direct','Organic Search':'ch-organic','AI Search':'ch-ai',
    'Referral':'ch-referral','Organic Social':'ch-social','Paid Search':'ch-paid'};
  return m[c] || 'ch-unknown';
}
function fmtNum(n) { return n == null ? '—' : n.toLocaleString(); }

function renderPane(container, data) {
  const totalSessions = data.buckets.reduce((a, b) => a + b.sessions, 0);
  const totalAI = data.buckets.reduce((a, b) => a + b.ai, 0);
  const topBucket = data.buckets[0];

  const blogBucket = data.buckets.find(b => b.bucket === '/blog/*');
  let bestBlog = { name: '—', val: 0 };
  if (blogBucket) {
    const ch = [['Direct', blogBucket.direct], ['Organic Search', blogBucket.organic],
                ['AI Search', blogBucket.ai], ['Referral', blogBucket.referral]];
    ch.sort((a, b) => b[1] - a[1]);
    const nonDirect = ch.find(c => c[0] !== 'Direct' && c[1] > 0);
    const pick = nonDirect || ch[0];
    bestBlog = { name: pick[0], val: pick[1] };
  }

  container.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi"><div class="label">Total Sessions</div><div class="value">${fmtNum(totalSessions)}</div><div class="sub">across ${fmtNum(data.total_urls)} URLs</div></div>
      <div class="kpi"><div class="label">Top Bucket</div><div class="value" style="font-size:20px;">${topBucket ? topBucket.bucket : '—'}</div><div class="sub">${topBucket ? fmtNum(topBucket.sessions) + ' sessions' : '—'}</div></div>
      <div class="kpi"><div class="label">AI Search Clicks</div><div class="value">${fmtNum(totalAI)}</div><div class="sub">ChatGPT + Perplexity + others</div></div>
      <div class="kpi"><div class="label">Best Blog Channel</div><div class="value" style="font-size:18px;">${bestBlog.name}</div><div class="sub">${fmtNum(bestBlog.val)} sessions</div></div>
    </div>

    <div class="insights">
      <div class="insights-card wins">
        <h3>✓ What's Working</h3>
        <ul>
          <li><strong>Blog Organic Search</strong> typically bounces below 50% (B2B benchmark is 60–75%) — search-sourced readers are engaged.</li>
          <li><strong>Funnel pages convert</strong>: /dashboard, /login, /create-account all bounce below 10%.</li>
          <li><strong>AI Search has the lowest bounce rate</strong> of any channel — small volume, high quality.</li>
        </ul>
      </div>
      <div class="insights-card probs">
        <h3>⚠ What to Fix</h3>
        <ul>
          <li><strong>/directory*</strong> bounces near 98% — investigate whether these pages are bot traffic or broken.</li>
          <li><strong>Homepage bounces at 75%</strong> — warm Direct visitors leaving.</li>
          <li><strong>Blog Direct traffic</strong> bounces at 91% — likely bots or misdirected, not real readers.</li>
        </ul>
      </div>
    </div>

    <div class="table-card">
      <h3>Traffic by Bucket — click any row to see the URLs</h3>
      <div class="legend">
        <span><span class="sw" style="background: var(--green-bg); border: 1px solid var(--green);"></span>Bounce &lt; 40%</span>
        <span><span class="sw" style="background: var(--yellow-bg); border: 1px solid var(--yellow);"></span>40–70%</span>
        <span><span class="sw" style="background: var(--red-bg); border: 1px solid var(--red);"></span>&gt; 70%</span>
      </div>
      <table class="data">
        <thead><tr>
          <th>Period</th><th>Bucket</th>
          <th class="num">Sessions</th><th class="num">% of Period</th>
          <th class="num">Users</th><th class="num">Bounce</th>
          <th>Top Channel</th>
          <th class="num">Direct</th><th class="num">Organic</th><th class="num">AI</th>
          <th class="num">Referral</th><th class="num">Social</th><th class="num">Paid</th><th class="num">Other</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  `;

  const tbody = container.querySelector('tbody');
  const periodTotalSessions = data.buckets.reduce((a, b) => a + b.sessions, 0);
  data.buckets.forEach((b, idx) => {
    const bPct = periodTotalSessions > 0 ? ((b.sessions / periodTotalSessions) * 100).toFixed(1) : '0.0';
    const bucketRow = document.createElement('tr');
    bucketRow.className = 'bucket-row';
    bucketRow.dataset.idx = idx;
    bucketRow.innerHTML = `
      <td><span class="period-tag">${data.period}</span></td>
      <td><span class="expand-icon">▸</span><span class="bucket-name">${b.bucket}</span></td>
      <td class="num">${fmtNum(b.sessions)}</td>
      <td class="num"><span class="${pctClass(parseFloat(bPct))}">${bPct}%</span></td>
      <td class="num">${fmtNum(b.users)}</td>
      <td class="num"><span class="${bounceClass(b.bounce)}">${b.bounce}%</span></td>
      <td><span class="channel-tag ${channelClass(b.top_channel)}">${b.top_channel}</span></td>
      <td class="num">${fmtNum(b.direct)}</td>
      <td class="num">${fmtNum(b.organic)}</td>
      <td class="num">${fmtNum(b.ai)}</td>
      <td class="num">${fmtNum(b.referral)}</td>
      <td class="num">${fmtNum(b.social)}</td>
      <td class="num">${fmtNum(b.paid)}</td>
      <td class="num">${fmtNum(b.other)}</td>`;
    tbody.appendChild(bucketRow);

    b.urls.forEach(u => {
      const uPct = periodTotalSessions > 0 ? ((u.sessions / periodTotalSessions) * 100).toFixed(1) : '0.0';
      const ur = document.createElement('tr');
      ur.className = 'url-row';
      ur.dataset.parent = idx;
      ur.innerHTML = `
        <td></td>
        <td class="url-cell">${u.url}</td>
        <td class="num">${fmtNum(u.sessions)}</td>
        <td class="num"><span class="${pctClass(parseFloat(uPct))}">${uPct}%</span></td>
        <td class="num">${fmtNum(u.users)}</td>
        <td class="num"><span class="${bounceClass(u.bounce)}">${u.bounce}%</span></td>
        <td><span class="channel-tag ${channelClass(u.top_channel)}">${u.top_channel}</span></td>
        <td class="num">${fmtNum(u.channels.Direct)}</td>
        <td class="num">${fmtNum(u.channels['Organic Search'])}</td>
        <td class="num">${fmtNum(u.channels['AI Search'])}</td>
        <td class="num">${fmtNum(u.channels.Referral)}</td>
        <td class="num">${fmtNum(u.channels['Organic Social'])}</td>
        <td class="num">${fmtNum(u.channels['Paid Search'])}</td>
        <td class="num">${fmtNum(u.other_channels)}</td>`;
      tbody.appendChild(ur);
    });
  });

  container.querySelectorAll('tr.bucket-row').forEach(row => {
    row.addEventListener('click', () => {
      row.classList.toggle('open');
      const idx = row.dataset.idx;
      container.querySelectorAll(`tr.url-row[data-parent="${idx}"]`).forEach(u => u.classList.toggle('open'));
    });
  });
}

function renderTimeSeries(container, periods, mode) {
  const allBuckets = [...new Set(periods.flatMap(p => p.buckets.map(b => b.bucket)))].sort();
  const filterId = `bucket-filter-${mode}`;
  const countId = `${filterId}-count`;
  container.innerHTML = `
    <div class="table-card">
      <h3>${mode === 'weekly' ? 'Last 52 weeks' : 'Last 12 months'} — every bucket shown, color-grouped by month</h3>
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap;">
        <label for="${filterId}" style="color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.04em; font-size:11px;">Filter bucket</label>
        <select id="${filterId}" style="padding:6px 28px 6px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; background:white; color:var(--navy); cursor:pointer; font-family:inherit; min-width:220px;">
          <option value="__all__">All buckets</option>
          ${allBuckets.map(b => `<option value="${b}">${b}</option>`).join('')}
        </select>
        <span id="${countId}" style="color:var(--muted); font-size:12px;"></span>
      </div>
      <table class="data totals">
        <thead><tr>
          <th>Period</th>
          <th>Bucket</th>
          <th class="num">Sessions</th>
          <th class="num">% of Period</th>
          <th class="num">Users</th>
          <th class="num">Bounce</th>
          <th>Top Channel</th>
          <th class="num">Direct</th>
          <th class="num">Organic</th>
          <th class="num">AI</th>
          <th class="num">Referral</th>
          <th class="num">Social</th>
          <th class="num">Paid</th>
          <th class="num">Other</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>`;
  const tbody = container.querySelector('tbody');
  const select = container.querySelector(`#${filterId}`);
  const countEl = container.querySelector(`#${countId}`);

  function applyFilter(bucket) {
    tbody.innerHTML = '';
    let prevMonth = null;
    let colorIdx = -1;
    let rowCount = 0;
    let totalSessions = 0;
    periods.forEach(p => {
      if (p.month_key !== prevMonth) {
        colorIdx = (colorIdx + 1) % 4;
        prevMonth = p.month_key;
      }
      p.buckets.forEach(b => {
        if (bucket !== '__all__' && b.bucket !== bucket) return;
        const pct = p.total_sessions > 0 ? ((b.sessions / p.total_sessions) * 100).toFixed(1) : '0.0';
        const tr = document.createElement('tr');
        tr.className = `month-c${colorIdx}`;
        tr.innerHTML = `
          <td><span class="period-tag">${p.period_label}</span></td>
          <td><span class="bucket-name">${b.bucket}</span></td>
          <td class="num">${fmtNum(b.sessions)}</td>
          <td class="num"><span class="${pctClass(parseFloat(pct))}">${pct}%</span></td>
          <td class="num">${fmtNum(b.users)}</td>
          <td class="num"><span class="${bounceClass(b.bounce)}">${b.bounce}%</span></td>
          <td><span class="channel-tag ${channelClass(b.top_channel)}">${b.top_channel}</span></td>
          <td class="num">${fmtNum(b.direct)}</td>
          <td class="num">${fmtNum(b.organic)}</td>
          <td class="num">${fmtNum(b.ai)}</td>
          <td class="num">${fmtNum(b.referral)}</td>
          <td class="num">${fmtNum(b.social)}</td>
          <td class="num">${fmtNum(b.paid)}</td>
          <td class="num">${fmtNum(b.other)}</td>`;
        tbody.appendChild(tr);
        rowCount++;
        totalSessions += b.sessions;
      });
    });
    countEl.textContent = bucket === '__all__'
      ? `${rowCount} rows across ${periods.length} ${mode === 'weekly' ? 'weeks' : 'months'}`
      : `${rowCount} ${mode === 'weekly' ? 'weeks' : 'months'} · ${fmtNum(totalSessions)} total sessions for ${bucket}`;
  }

  select.addEventListener('change', () => applyFilter(select.value));
  applyFilter('__all__');
}

document.querySelectorAll('.tab-content').forEach(pane => {
  const key = pane.dataset.payload;
  if (key === 'weekly' || key === 'monthly') {
    renderTimeSeries(pane, DATA[key], key);
  } else {
    renderPane(pane, DATA[key]);
  }
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});
</script>
</body>
</html>
